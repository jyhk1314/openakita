# SynapseTerm 专用：屏蔽 tmux 默认「进入 copy-mode」的入口。
# 说明：无法从引擎里彻底删除 copy-mode；本文件只关掉常见快捷键与鼠标路径。
# 仍可通过「tmux/psmux 命令」或本应用接口显式执行 copy-mode。
# 键位绑定对当前 psmux server 进程全局生效（一般仅本应用会连该 server）。

# 前缀 [、前缀 PageUp
unbind-key [
unbind-key PPage

# 鼠标：拖拽 / 上滚不再进入 copy-mode，事件转交给 pane 内程序
bind-key -n MouseDrag1Pane send-keys -M
bind-key -n WheelUpPane send-keys -M

# 双击 / 三击：不再进入 copy-mode
bind-key -n DoubleClick1Pane { select-pane -t= ; send -M }
bind-key -n TripleClick1Pane { select-pane -t= ; send -M }

# 滚动条：不再触发 copy-mode（轻量刷新状态条，等价于无操作）
bind-key -n MouseDown1ScrollbarUp refresh-client -S
bind-key -n MouseDown1ScrollbarDown refresh-client -S
bind-key -n MouseDrag1ScrollbarSlider refresh-client -S
